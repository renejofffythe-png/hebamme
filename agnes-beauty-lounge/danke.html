<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Danke für deine Anfrage – Agnes Beauty Lounge</title>
<meta name="robots" content="noindex">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{--cream:#f8f3ec;--ink:#3a3631;--ink-soft:#6c645a;--accent:#9c7f57}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Jost',sans-serif;font-weight:300;background:var(--cream);color:var(--ink);min-height:100vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:30px}
.card{max-width:520px}
.ic{width:78px;height:78px;border-radius:50%;border:1px solid var(--accent);display:flex;align-items:center;justify-content:center;color:var(--accent);margin:0 auto 26px}
.ic svg{width:34px;height:34px}
h1{font-family:'Cormorant Garamond',serif;font-size:clamp(36px,6vw,52px);font-weight:500;margin-bottom:16px}
p{color:var(--ink-soft);font-size:17px;line-height:1.7;margin-bottom:30px}
a.btn{display:inline-flex;align-items:center;gap:10px;font-size:14px;letter-spacing:.12em;text-transform:uppercase;background:var(--ink);color:var(--cream);padding:15px 30px;border-radius:40px;text-decoration:none;transition:.25s}
a.btn:hover{background:#262320}
</style>
</head>
<body>
<div class="card">
  <div class="ic"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M20 6L9 17l-5-5"/></svg></div>
  <h1>Vielen Dank!</h1>
  <p>Deine Anfrage ist bei mir angekommen. Ich melde mich so schnell wie möglich persönlich bei dir zurück, um einen Termin abzustimmen.<br><br>Deine Agnes</p>
  <a href="/" class="btn">Zurück zur Startseite</a>
</div>
</body>
</html>
