# Netlify-Konfiguration – statische Seite, kein Build-Step
# Site-Einstellung: Base directory = hebamme-kristina-schuldeis
[build]
  publish = "."
  command = ""

# Sicherheits- & Caching-Header
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
