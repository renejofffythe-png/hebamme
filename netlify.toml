# Netlify-Konfiguration für die Joythe & Richert Website.
# Die Seite liegt im Unterordner joythe-richert-website (Monorepo) und hat
# keinen Build-Step – Netlify deployt die statischen Dateien direkt.

[build]
  publish = "joythe-richert-website"

# Sicherheits-Header für alle Seiten
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(), microphone=(), camera=()"

# CSS/JS: KEIN immutable-Caching, da die Dateinamen stabil sind (kein
# Content-Hashing). Sonst behalten Browser alte Versionen nach einem Update.
# Netlify liefert ETags – Revalidierung ist billig (304 wenn unverändert).
[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Bilder ändern sich praktisch nie – moderates Caching ist ok.
[[headers]]
  for = "/img/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
