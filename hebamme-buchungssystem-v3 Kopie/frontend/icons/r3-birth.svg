<!-- Richtung 3: birth — Zwei geschwungene Linien bilden schützende Schale (Hände als Kuppelung), kleiner Kreis darin -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#6b7c5c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!--
    Linke Hand/Kurve: kommt von links-unten, wölbt sich nach innen-oben,
    endet mittig oben — schützend nach rechts geöffnet
  -->
  <path d="M4.5 18.0
           C4.5 18.0  5.0 14.0  7.5 11.5
           C9.5 9.5   11.0 9.0  12.0 9.0"/>

  <!--
    Rechte Hand/Kurve: gespiegelt, kommt von rechts-unten, wölbt sich nach innen-oben
  -->
  <path d="M19.5 18.0
           C19.5 18.0  19.0 14.0  16.5 11.5
           C14.5 9.5   13.0 9.0  12.0 9.0"/>

  <!-- Verbindungsbogen unten — schließt die Schale -->
  <path d="M4.5 18.0 C6.5 20.5 9.5 21.5 12 21.5 C14.5 21.5 17.5 20.5 19.5 18.0"/>

  <!-- Kleiner Kreis in der Schale — das Kind/das Neue -->
  <circle cx="12" cy="14.0" r="2.0"/>

</svg>
