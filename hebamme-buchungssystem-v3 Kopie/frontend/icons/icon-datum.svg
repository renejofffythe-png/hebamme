<!-- icon-datum: Kalender — Rahmen mit Ösen, Trennlinie, zwei Reihen Datumsstriche -->
<!-- Basis: r1-datum, optimiert: alle Koordinaten auf 0.5-Raster · rect exakt zentriert -->
<!-- Rahmen: x=4.0 w=16 h=15 → rechte Kante x=20.0 · Ösen symmetrisch bei x=8.5 / x=15.5 -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#8a7a68" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Kalenderrahmen — rx=2 für weiche Ecken, Oberkante y=5.5 -->
  <rect x="4.0" y="5.5" width="16.0" height="15.0" rx="2" ry="2"/>

  <!-- Öse links — überragt Rahmen-Oberkante nach oben -->
  <line x1="8.5" y1="3.5" x2="8.5" y2="7.5"/>

  <!-- Öse rechts — gespiegelt an x=12 -->
  <line x1="15.5" y1="3.5" x2="15.5" y2="7.5"/>

  <!-- Kopfzeilen-Trennlinie — verbindet linken und rechten Rahmenrand -->
  <line x1="4.0" y1="9.5" x2="20.0" y2="9.5"/>

  <!-- Datumsstrich Reihe 1 links -->
  <line x1="7.5" y1="13.0" x2="10.5" y2="13.0"/>

  <!-- Datumsstrich Reihe 1 rechts — symmetrisch zu Reihe 1 links -->
  <line x1="13.5" y1="13.0" x2="16.5" y2="13.0"/>

  <!-- Datumsstrich Reihe 2 links -->
  <line x1="7.5" y1="16.5" x2="10.5" y2="16.5"/>

  <!-- Datumsstrich Reihe 2 rechts — symmetrisch zu Reihe 2 links -->
  <line x1="13.5" y1="16.5" x2="16.5" y2="16.5"/>

</svg>
