<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" fill="none" stroke="#6b7c5c" stroke-linecap="round" stroke-linejoin="round">

  <!-- Central flower — 6 oval petals around center point (90,90) -->
  <!-- Petal 1: top -->
  <path d="M 90 90 C 86 82 86 74 90 70 C 94 74 94 82 90 90"
        stroke-width="0.9"/>
  <!-- Petal 2: upper-right -->
  <path d="M 90 90 C 97 84 104 82 107 86 C 104 90 97 90 90 90"
        stroke-width="0.9"/>
  <!-- Petal 3: lower-right -->
  <path d="M 90 90 C 98 93 102 100 100 104 C 96 103 91 97 90 90"
        stroke-width="0.9"/>
  <!-- Petal 4: bottom -->
  <path d="M 90 90 C 86 98 86 106 90 110 C 94 106 94 98 90 90"
        stroke-width="0.9"/>
  <!-- Petal 5: lower-left -->
  <path d="M 90 90 C 82 93 76 100 78 104 C 82 103 88 97 90 90"
        stroke-width="0.9"/>
  <!-- Petal 6: upper-left -->
  <path d="M 90 90 C 82 85 76 82 73 86 C 76 90 83 91 90 90"
        stroke-width="0.9"/>
  <!-- Center dot -->
  <circle cx="90" cy="90" r="3" stroke-width="0.8"/>

  <!-- Ring element 1 — tall leaf, top (pointing ~0°, 12 o'clock) -->
  <path d="M 90 88 C 86 74 84 55 88 42 C 90 36 91 36 92 42 C 96 55 94 74 90 88"
        stroke-width="1" fill="none"/>
  <!-- Midrib for leaf 1 -->
  <path d="M 90 88 C 90 72 90 54 90 42" stroke-width="0.6"/>

  <!-- Ring element 2 — medium leaf, upper-right (~60°) -->
  <path d="M 92 88 C 102 77 116 62 128 54 C 131 52 132 53 130 56 C 122 66 108 78 92 90"
        stroke-width="1"/>
  <!-- Midrib -->
  <path d="M 92 88 C 108 76 122 65 130 56" stroke-width="0.6"/>

  <!-- Ring element 3 — narrow grass-like stem, right (~90°) -->
  <path d="M 92 90 C 110 87 130 86 144 82 C 148 81 148 83 144 85 C 130 89 110 90 92 92"
        stroke-width="0.9"/>

  <!-- Ring element 4 — leaf, lower-right (~130°) -->
  <path d="M 91 92 C 104 102 118 116 122 130 C 123 134 121 135 119 132 C 113 120 100 106 91 94"
        stroke-width="1"/>
  <!-- Midrib -->
  <path d="M 91 92 C 103 106 114 118 119 132" stroke-width="0.6"/>

  <!-- Ring element 5 — short leaf, lower-left (~210°) -->
  <path d="M 88 92 C 78 102 66 114 56 122 C 53 125 52 123 55 121 C 64 113 76 101 88 92"
        stroke-width="1"/>

  <!-- Ring element 6 — narrow stem with dot tip, left (~270°) -->
  <path d="M 88 90 C 72 88 52 88 36 84" stroke-width="0.9"/>
  <circle cx="36" cy="84" r="2" stroke-width="0.8"/>

  <!-- Ring element 7 — leaf, upper-left (~300°) -->
  <path d="M 88 88 C 78 76 65 62 52 52 C 49 49 50 48 53 50 C 66 59 79 74 88 88"
        stroke-width="1"/>
  <!-- Midrib -->
  <path d="M 88 88 C 77 75 65 61 53 50" stroke-width="0.6"/>

  <!-- Accent dots between ring elements — organic filler -->
  <circle cx="112" cy="60" r="1.5" stroke-width="0.8"/>
  <circle cx="130" cy="110" r="1.2" stroke-width="0.7"/>
  <circle cx="58" cy="120" r="1.5" stroke-width="0.8"/>
  <!-- Small short stroke filler near top-right gap -->
  <path d="M 106 50 C 109 46 112 44 114 46" stroke-width="0.7"/>

</svg>
