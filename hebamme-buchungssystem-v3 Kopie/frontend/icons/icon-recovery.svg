<!-- icon-recovery: Rückbildung — Salbeiblatt, alle stroke 1.5, Koordinaten auf 0.5-Raster -->
<!-- Konstruktion: Blattumriss als geschlossener Pfad · Mittelrippe als line · 2 Rippenpaare -->
<!-- Leichte Asymmetrie: rechte Seite 0.5px breiter — natürlich, kein Spiegel-Artefakt -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#7a6045" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Blattumriss — Spitze bei (12, 4.0), Basis bei (12, 20.0) -->
  <!-- Rechte Seite schwingt bis x=17.5, linke bis x=6.5 -->
  <path d="M12 4.0
           C14.5 4.5  17.5 7.5  17.5 11.0
           C17.5 14.5  15.5 18.0  13.0 19.5
           C12.5 19.5  12.0 20.0  12.0 20.0
           C12.0 20.0  11.5 19.5  11.0 19.0
           C8.5 17.5   6.5 14.0   6.5 11.0
           C6.5 7.5    9.5 4.5   12 4.0 Z"/>

  <!-- Mittelrippe — durchgehend von Basis (y=19.5) bis kurz vor Spitze (y=5.0) -->
  <line x1="12" y1="5.0" x2="12" y2="19.5"/>

  <!-- Rippe links oben — startet auf Mittelrippe bei y=9.0, endet oben-links -->
  <path d="M12 9.0 C10.5 8.5  9.0 7.5  8.0 6.5"/>

  <!-- Rippe rechts oben — exakte Spiegelung -->
  <path d="M12 9.0 C13.5 8.5  15.0 7.5  16.0 6.5"/>

  <!-- Rippe links unten — startet auf Mittelrippe bei y=14.0, endet unten-links -->
  <path d="M12 14.0 C10.5 13.5  9.0 13.0  8.0 12.0"/>

  <!-- Rippe rechts unten — exakte Spiegelung -->
  <path d="M12 14.0 C13.5 13.5  15.0 13.0  16.0 12.0"/>

</svg>
