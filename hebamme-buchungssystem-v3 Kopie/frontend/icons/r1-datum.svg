<!-- Richtung 1: datum — Kleines Kalenderblatt, Quadrat mit abgerundeten Ecken, Ösen, Trennlinie, Striche -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#8a7a68" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Kalenderrahmen mit 2px Eckenradius -->
  <rect x="4" y="5.5" width="16" height="15" rx="2" ry="2"/>

  <!-- Öse links -->
  <line x1="8.5" y1="3.5" x2="8.5" y2="7.0"/>

  <!-- Öse rechts -->
  <line x1="15.5" y1="3.5" x2="15.5" y2="7.0"/>

  <!-- Trennlinie oberes Drittel -->
  <line x1="4" y1="9.5" x2="20" y2="9.5"/>

  <!-- Datum-Strich links -->
  <line x1="8" y1="13.5" x2="11" y2="13.5"/>

  <!-- Datum-Strich rechts -->
  <line x1="13" y1="13.5" x2="16" y2="13.5"/>

  <!-- Zweite Reihe links -->
  <line x1="8" y1="16.5" x2="11" y2="16.5"/>

</svg>
