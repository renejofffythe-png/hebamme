<!-- Richtung 2: recovery — Abnehmende Mondsichel, zwei kreisförmige Pfade ergeben Sichelform -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#7a6045" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!--
    Sichelform: äußerer Kreisbogen (linke Seite des Vollmonds) minus innerer Kreisbogen.
    Äußerer Kreis: Mitte (12, 12), Radius 7
    Innerer Kreis: Mitte (14.5, 12), Radius 6  — erzeugt die Sichelöffnung rechts
    Beide Bögen verbunden als single closed path.
  -->
  <path d="M12 5.0
           C8.2 5.0  5.0 8.2  5.0 12.0
           C5.0 15.8  8.2 19.0  12 19.0
           C10.2 17.0  9.0 14.6  9.0 12.0
           C9.0 9.4   10.2 7.0  12 5.0 Z"/>

</svg>
