<!-- icon-birth: Geburtsvorbereitung — zwei schützende Arme umschließen einen runden Kern -->
<!-- Metapher: Geborgenheit, Schutz, neues Leben -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#6b7c5c" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Kern — kleiner Kreis, symbolisiert das werdende Kind -->
  <circle cx="12" cy="11.5" r="2.5"/>

  <!-- Linker Schutzarm — schwingt von unten-links nach oben-links um den Kern -->
  <path d="M12 19.5
           C8.5 19.5  5.5 17.0  5.5 13.0
           C5.5 9.5   7.5 7.0   9.5 6.0"/>

  <!-- Rechter Schutzarm — gespiegelt, schwingt von unten-rechts nach oben-rechts -->
  <path d="M12 19.5
           C15.5 19.5  18.5 17.0  18.5 13.0
           C18.5 9.5   16.5 7.0   14.5 6.0"/>

  <!-- Kleines Blatt oben links — botanisches Marken-Element -->
  <path d="M9.5 6.0
           C9.0 4.5   10.5 3.5  12 4.5"/>

  <!-- Kleines Blatt oben rechts — gespiegelt -->
  <path d="M14.5 6.0
           C15.0 4.5   13.5 3.5  12 4.5"/>

</svg>
