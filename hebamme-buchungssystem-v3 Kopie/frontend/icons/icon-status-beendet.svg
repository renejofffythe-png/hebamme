<!-- icon-status-beendet: Kurs beendet — offener Kreis mit horizontalem Trennstrich -->
<!-- Metapher: Abschluss, Stille, Abgeschlossenheit — ruhig und klar -->
<!-- Kreis-Stroke in ink-muted, Trennstrich stoppt 1px vor Kreisrand für Klarheit -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#8a7a68" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Kreis, cx/cy=12, r=6.5 -->
  <circle cx="12" cy="12" r="6.5"/>

  <!-- Horizontaler Trennstrich — verläuft von Rand zu Rand durch Kreismitte -->
  <line x1="5.5" y1="12" x2="18.5" y2="12"/>

</svg>
