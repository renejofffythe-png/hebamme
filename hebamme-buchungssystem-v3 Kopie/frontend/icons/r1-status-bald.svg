<!-- Richtung 1: status bald — Kleine Knospe, noch geschlossen, halbrundes Oval auf Stiel -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#7a6045" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Stiel -->
  <line x1="12" y1="19.5" x2="12" y2="15.0"/>

  <!-- Knospe: geschlossene Tränenform, schmal, Spitze oben -->
  <path d="M12 7.0
           C14.0 7.5  15.2 9.2  15.0 11.2
           C14.8 13.2  13.6 14.6  12 15.0
           C10.4 14.6   9.2 13.2   9.0 11.2
           C8.8 9.2   10.0 7.5  12 7.0 Z"/>

  <!-- Zwei kleine Kelchblätter die die Knospe stützen -->
  <path d="M9.5 13.5 C8.5 12.5 8.0 11.0 9.0 10.0"/>
  <path d="M14.5 13.5 C15.5 12.5 16.0 11.0 15.0 10.0"/>

</svg>
