<!-- Richtung 3: status bald — Zwei Dreiecke als Sanduhr, sehr vereinfacht, "Zeit läuft" -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#7a6045" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Horizontale Linien oben und unten der Sanduhr -->
  <line x1="7.0" y1="5.5" x2="17.0" y2="5.5"/>
  <line x1="7.0" y1="18.5" x2="17.0" y2="18.5"/>

  <!-- Oberes Dreieck: Linien von den Ecken zur Mitte -->
  <path d="M7.0 5.5 C8.5 7.5 10.5 10.5 12.0 12.0"/>
  <path d="M17.0 5.5 C15.5 7.5 13.5 10.5 12.0 12.0"/>

  <!-- Unteres Dreieck: von Mitte zu den Ecken -->
  <path d="M12.0 12.0 C10.5 13.5 8.5 16.5 7.0 18.5"/>
  <path d="M12.0 12.0 C13.5 13.5 15.5 16.5 17.0 18.5"/>

</svg>
