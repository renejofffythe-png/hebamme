<!-- Richtung 3: status voll — Kleines rundes Rechteck, gefüllt, stilisierte Faust / "kein Durchlass" -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#8a7a68"
     stroke="#8a7a68" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Rundes Rechteck, gefüllt — geschlossene Faust / blockiertes Feld -->
  <rect x="7.5" y="8.5" width="9.0" height="7.0" rx="2.5" ry="2.5"/>

  <!-- Drei kleine Finger-Erhebungen oben — Faust-Andeutung -->
  <path d="M8.5 8.5 C8.5 7.0 9.5 6.5 10.2 7.2" stroke="#f5efe6" stroke-width="1" fill="none"/>
  <path d="M11.0 8.5 C11.0 6.8 12.0 6.2 12.8 7.0" stroke="#f5efe6" stroke-width="1" fill="none"/>
  <path d="M13.5 8.5 C13.5 7.0 14.5 6.5 15.2 7.2" stroke="#f5efe6" stroke-width="1" fill="none"/>

</svg>
