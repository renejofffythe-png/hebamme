<!-- Richtung 1: recovery — Salbeiblatt, leicht asymmetrisch, Mittelrippe prominent, feine Seitenrippen -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#7a6045" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Blattumriss — breit unten, spitz oben, leicht asymmetrisch -->
  <path d="M12 4.5
           C14.8 5.2  17.2 7.5  17.5 10.5
           C17.8 13.5  16.2 16.5  13.5 18.2
           C12.8 18.6  12.2 18.8  12 19.0
           C11.8 18.8  11.2 18.6  10.5 18.2
           C7.8 16.5   6.2 13.5   6.5 10.5
           C6.8 7.5    9.2 5.2    12 4.5 Z"/>

  <!-- Mittelrippe — prominent, 2px via separate stroke group -->
  <line x1="12" y1="5.5" x2="12" y2="18.5" stroke-width="2"/>

  <!-- Seitenrippe links oben -->
  <path d="M12 9.5 C10.5 9.0 9.2 8.2 8.5 7.2" stroke-width="1"/>

  <!-- Seitenrippe links Mitte -->
  <path d="M12 12.5 C10.2 12.0 8.8 11.2 7.8 10.0" stroke-width="1"/>

  <!-- Seitenrippe links unten -->
  <path d="M12 15.5 C10.5 15.5 9.2 15.2 8.2 14.5" stroke-width="1"/>

  <!-- Seitenrippe rechts oben -->
  <path d="M12 9.5 C13.5 9.0 14.8 8.2 15.5 7.2" stroke-width="1"/>

  <!-- Seitenrippe rechts Mitte -->
  <path d="M12 12.5 C13.8 12.0 15.2 11.2 16.2 10.0" stroke-width="1"/>

  <!-- Seitenrippe rechts unten -->
  <path d="M12 15.5 C13.5 15.5 14.8 15.2 15.8 14.5" stroke-width="1"/>

</svg>
