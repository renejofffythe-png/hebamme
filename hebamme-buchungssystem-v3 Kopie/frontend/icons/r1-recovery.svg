<!-- Richtung 1: recovery — Salbeiblatt, leicht asymmetrisch, Mittelrippe prominent, feine Seitenrippen -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
     stroke="#7a6045" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">

  <!-- Blattumriss — leicht asymmetrisch: rechte Seite minimal breiter, Basis runder -->
  <path d="M12 4.0
           C14.2 4.8  16.8 7.0  17.4 10.2
           C18.0 13.4  16.5 16.8  13.8 18.6
           C13.0 19.1  12.4 19.4  12 19.5
           C11.6 19.4  10.8 19.0  10.0 18.4
           C7.4 16.6   5.8 13.2   6.4 10.0
           C7.0 6.8    9.8 4.6   12 4.0 Z"/>

  <!-- Mittelrippe — prominent -->
  <line x1="12" y1="4.8" x2="12" y2="19.0" stroke-width="2"/>

  <!-- Seitenrippe links oben -->
  <path d="M12 8.5 C10.8 8.0 9.5 7.2 8.6 6.0" stroke-width="1"/>

  <!-- Seitenrippe links Mitte -->
  <path d="M12 12.0 C10.4 11.5 8.8 10.8 7.8 9.4" stroke-width="1"/>

  <!-- Seitenrippe links unten -->
  <path d="M12 15.5 C10.6 15.4 9.2 15.0 8.2 14.0" stroke-width="1"/>

  <!-- Seitenrippe rechts oben -->
  <path d="M12 8.5 C13.2 8.0 14.6 7.2 15.6 6.0" stroke-width="1"/>

  <!-- Seitenrippe rechts Mitte -->
  <path d="M12 12.0 C13.6 11.5 15.2 10.8 16.2 9.4" stroke-width="1"/>

  <!-- Seitenrippe rechts unten -->
  <path d="M12 15.5 C13.4 15.4 14.8 15.0 15.8 14.0" stroke-width="1"/>

</svg>
